<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50 Free Spins</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="logo">
        <img src="./images/logo.png" alt="Black Lotus Casino Logo" class="max-w-[150px] xs:max-w-[180px] pt-[4px]">
    </div>

    <div class="bonus-container">
     <h1 class="top-line">
        <span class="silver">200%</span>
        <span class="gold">MATCH BONUS </span>
        <span class="silver">UP TO $7000 </span>
     </h1>
     <h2 class="bottom-line">
        <span class="silver plus">+ 50</span>
        <span class="gold">Free Spins</span>
        <span class="big-game">ON BIG GAME</span>
    </h2>
    </div>
    <div class="btn-wrap">
         <a href="#" class="cta-btn">Sign Up Today!</a>
     </div>

     
  <div class="steps-wrapper">

    <div class="step-box">
      <div class="step-header">
        <span class="step-number">1</span>
        <span class="step-label">Join</span>
      </div>
      <p class="step-desc">In 30 seconds.</p>
    </div>

    <div class="step-box">
      <div class="step-header">
        <span class="step-number">2</span>
        <span class="step-label">Claim</span>
      </div>
      <p class="step-desc">Enter your Code.</p>
    </div>

    <div class="step-box">
      <div class="step-header">
        <span class="step-number">3</span>
        <span class="step-label">Play</span>
      </div>
      <p class="step-desc">Enjoy 100's of slots!</p>
    </div>

  </div>

     

    
</body>
</html>
